<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aplikasi Stok</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-4 bg-slate-100">

  <div class="max-w-md mx-auto bg-white p-4 rounded-xl shadow">
    <h2 class="font-bold text-lg mb-3">Daftar Stok Barang</h2>
    <div id="hasil-data" class="text-sm text-slate-600">Memuat data...</div>
  </div>

  <script>
    // Tempel URL Web App Google Apps Script Anda di sini:
    const API_URL = "https://script.google.com/macros/s/AKfycbyg6cYRYmOZoUpQNWiwv0-zpjgk3fkFbIVqr2QgYW261AGyrm60AxMBwiULtQYuy45fVQ/exec";

    fetch(API_URL)
      .then(res => res.json())
      .then(data => {
        let html = "<ul class='space-y-2'>";
        data.forEach(row => {
          let id = row[0];
          let nama = row[1];
          let stok = row[4];
          html += `<li class='p-2 bg-slate-50 border rounded'><b>${id}</b> - ${nama} <br><span class='text-xs text-indigo-600 font-bold'>Stok: ${stok} pcs</span></li>`;
        });
        html += "</ul>";
        document.getElementById('hasil-data').innerHTML = html;
      })
      .catch(err => {
        document.getElementById('hasil-data').innerHTML = "Gagal memuat data.";
      });
  </script>
</body>
</html>
